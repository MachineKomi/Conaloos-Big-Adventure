<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#fff8e7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Conaloo's Big Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Fredoka:wght@500;700&display=swap"
    />
    <style>
      :root {
        color-scheme: light;
        --paper: #fff8e7;
        --ink: #2b2b2b;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: 'Atkinson Hyperlegible', system-ui, sans-serif;
        overflow: hidden;
        width: 100%;
        height: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      #app canvas {
        display: block;
        outline: none;
      }
      #boot-message {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Fredoka', system-ui, sans-serif;
        font-size: 28px;
        text-align: center;
        padding: 24px;
        color: #4a3a1f;
        pointer-events: none;
        transition: opacity 600ms ease;
      }
      #boot-message.hidden {
        opacity: 0;
      }
      /* Hide the OS context menu jiggle for tablets. */
      * {
        -webkit-touch-callout: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot-message">The crayons are warming up&hellip;</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
